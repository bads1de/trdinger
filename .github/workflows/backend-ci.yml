name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          cache-dependency-glob: "backend/pyproject.toml"

      - name: 依存関係のインストール
        run: uv sync --all-extras

      - name: Pytestテスト実行
        run: uv run pytest
